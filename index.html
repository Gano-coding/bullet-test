<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="十二道情境题，测出你在鹅城里的三面人格。" />
    <title>鹅城人格鉴定</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700;900&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0D0A06 !important;
        color: #C8BBA5;
      }
      html.light, html.light body,
      html.dark, html.dark body {
        background-color: #0D0A06 !important;
        color: #C8BBA5;
      }
    </style>
    <script>
      // 在 React 加载前立即设置主题，避免闪烁
      (function() {
        const isInIframe = window.self !== window.top;

        function applyThemeToDOM(theme) {
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute('data-theme', theme);
        }

        if (isInIframe) {
          // 监听父窗口主动推送的主题消息
          window.addEventListener('message', function(event) {
            if (event.data && typeof event.data.theme === 'string') {
              var theme = event.data.theme;
              if (theme === 'light' || theme === 'dark') {
                applyThemeToDOM(theme);
              }
            }
          });
        } else {
          // 非 iframe 环境：鹅城黑金主题
          applyThemeToDOM('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
